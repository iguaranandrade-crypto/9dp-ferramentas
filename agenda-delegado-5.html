<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda do Delegado · 9DP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --noir-deep:#0c0c0e;
    --noir:#16151a;
    --noir-raised:#1e1d23;
    --paper:#ece7db;
    --paper-dim:#948d7c;
    --gold:#b6902f;
    --gold-bright:#d8b34a;
    --red:#8a3230;
    --green:#4d6a45;
    --line:#2c2a30;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--noir-deep);color:var(--paper);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}
  .wrap{max-width:800px;margin:0 auto;padding:26px 18px 90px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-start;gap:14px;
    border-bottom:2px solid var(--gold);padding-bottom:20px;margin-bottom:26px;flex-wrap:wrap;
  }
  .badge-unit{display:flex;align-items:center;gap:16px;}
  .unit-mark{width:54px;height:54px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .unit-mark img{width:100%;height:100%;object-fit:contain;}
  .agenda-title .big-title{
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:32px;margin:0;
    text-transform:uppercase;letter-spacing:.015em;line-height:1.05;color:var(--paper);
  }
  .agenda-title .delegado-name{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:19px;
    color:var(--gold-bright);margin-top:3px;letter-spacing:.02em;
  }
  .agenda-title .unit-label{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:var(--paper-dim);
    text-transform:uppercase;margin-bottom:3px;
  }
  .user-email{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--paper-dim);margin-right:8px;}
  .btn-logout{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
    background:transparent;border:1px solid var(--line);color:var(--paper-dim);padding:6px 11px;border-radius:3px;cursor:pointer;
  }
  .btn-logout:hover{border-color:var(--red);color:var(--paper);}
  .sync-dot{
    display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;
    color:var(--paper-dim);letter-spacing:.05em;text-transform:uppercase;margin-right:10px;
  }
  .sync-dot .dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;
    box-shadow:0 0 0 0 rgba(77,106,69,.6);animation:pulse 2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(77,106,69,.5);}
    70%{box-shadow:0 0 0 6px rgba(77,106,69,0);}
    100%{box-shadow:0 0 0 0 rgba(77,106,69,0);}
  }

  .stats-row{display:flex;gap:22px;margin-bottom:20px;flex-wrap:wrap;}
  .stat{font-family:'IBM Plex Mono',monospace;}
  .stat .n{font-size:22px;font-weight:600;color:var(--gold-bright);display:block;line-height:1;}
  .stat .l{font-size:9.5px;color:var(--paper-dim);letter-spacing:.08em;text-transform:uppercase;}

  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;padding:6px 12px;
    border:1px solid var(--line);border-radius:3px;background:transparent;color:var(--paper-dim);
    cursor:pointer;text-transform:uppercase;transition:.15s;
  }
  .chip:hover{border-color:var(--gold);color:var(--paper);}
  .chip.active{background:var(--gold);border-color:var(--gold);color:var(--noir-deep);font-weight:600;}
  .btn-add{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em;background:var(--gold);
    color:var(--noir-deep);border:none;padding:10px 18px;border-radius:3px;cursor:pointer;font-weight:600;
    text-transform:uppercase;transition:.15s;
  }
  .btn-add:hover{background:var(--gold-bright);}
  .search{
    flex:1;min-width:170px;background:var(--noir-raised);border:1px solid var(--line);border-radius:3px;
    padding:9px 12px;color:var(--paper);font-family:'IBM Plex Sans',sans-serif;font-size:13px;
  }
  .search:focus{outline:2px solid var(--gold);outline-offset:-1px;}
  .search::placeholder{color:var(--paper-dim);}

  .list{display:flex;flex-direction:column;gap:10px;}
  .empty{text-align:center;padding:60px 20px;color:var(--paper-dim);border:1px dashed var(--line);border-radius:6px;}
  .empty strong{display:block;color:var(--paper);font-size:16px;margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;}

  .aud-card{
    background:var(--noir);border:1px solid var(--line);border-left:4px solid var(--gold);
    border-radius:4px;padding:14px 17px;cursor:pointer;transition:.15s;
    display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .aud-card:hover{border-color:var(--gold);background:var(--noir-raised);}
  .aud-card.status-realizada{border-left-color:var(--green);}
  .aud-card.status-adiada{border-left-color:var(--gold);}
  .aud-card.status-cancelada{border-left-color:var(--paper-dim);}
  .aud-card.overdue{border-left-color:var(--red);}
  .aud-datetime{font-family:'IBM Plex Mono',monospace;text-align:center;flex-shrink:0;min-width:64px;}
  .aud-datetime .d{font-size:20px;font-weight:600;color:var(--gold-bright);line-height:1;}
  .aud-datetime .m{font-size:10px;color:var(--paper-dim);text-transform:uppercase;letter-spacing:.06em;}
  .aud-datetime .t{font-size:12px;color:var(--paper);margin-top:3px;}
  .aud-info{flex:1;min-width:200px;}
  .aud-proc{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--gold-bright);letter-spacing:.03em;}
  .aud-tipo{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;text-transform:uppercase;margin-top:2px;}
  .aud-meta{font-size:12px;color:var(--paper-dim);margin-top:4px;}
  .aud-meta b{color:var(--paper);font-weight:500;}
  .aud-edit-info{font-size:10px;color:var(--paper-dim);margin-top:6px;font-family:'IBM Plex Mono',monospace;opacity:.7;}
  .mod-tag{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;
    padding:2px 7px;border-radius:2px;margin-left:8px;display:inline-block;
  }
  .mod-tag.presencial{background:rgba(182,144,47,.15);color:var(--gold-bright);}
  .mod-tag.video{background:rgba(140,140,150,.15);color:var(--paper-dim);}
  .env-tag{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;
    padding:2px 7px;border-radius:2px;display:inline-block;
  }
  .env-tag.vitima{background:rgba(77,106,69,.2);color:#8fb37e;}
  .env-tag.autor{background:rgba(138,50,48,.2);color:#c98785;}
  .env-tag.testemunha{background:rgba(182,144,47,.15);color:var(--gold-bright);}
  .badge{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:2px;white-space:nowrap;}
  .badge.status-agendada{background:rgba(182,144,47,.18);color:var(--gold-bright);}
  .badge.status-realizada{background:rgba(77,106,69,.22);color:#8fb37e;}
  .badge.status-adiada{background:rgba(182,144,47,.18);color:var(--gold-bright);}
  .badge.status-cancelada{background:rgba(148,141,124,.15);color:var(--paper-dim);}

  .overlay{position:fixed;inset:0;background:rgba(4,4,5,.8);display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow-y:auto;z-index:50;}
  .overlay.open{display:flex;}
  .modal{background:var(--noir);border:1px solid var(--line);border-radius:6px;max-width:540px;width:100%;padding:24px 24px 20px;}
  .modal h2{
    font-family:'Barlow Condensed',sans-serif;font-size:22px;text-transform:uppercase;margin:0 0 16px;
    padding-bottom:12px;border-bottom:1px solid var(--gold);display:flex;justify-content:space-between;align-items:center;
    color:var(--paper);
  }
  .modal h2 .close{cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--paper-dim);font-weight:400;border:1px solid var(--line);padding:4px 10px;border-radius:3px;}
  .modal h2 .close:hover{color:var(--paper);border-color:var(--gold);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--gold-bright);margin-bottom:5px;}
  .field input,.field select,.field textarea{
    width:100%;background:var(--noir-raised);border:1px solid var(--line);border-radius:3px;
    padding:9px 11px;color:var(--paper);font-family:'IBM Plex Sans',sans-serif;font-size:13px;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--gold);outline-offset:-1px;}
  .field textarea{min-height:56px;resize:vertical;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .modal-actions{display:flex;justify-content:space-between;gap:10px;margin-top:6px;}
  .btn-danger{background:transparent;border:1px solid var(--red);color:#c98785;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:9px 14px;border-radius:3px;cursor:pointer;}
  .btn-danger:hover{background:rgba(138,50,48,.15);}
  .btn-save{background:var(--gold);border:none;color:var(--noir-deep);font-weight:600;font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.05em;padding:9px 20px;border-radius:3px;cursor:pointer;}
  .btn-save:hover{background:var(--gold-bright);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--paper-dim);font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:9px 14px;border-radius:3px;cursor:pointer;}
  .btn-ghost:hover{color:var(--paper);border-color:var(--gold);}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--noir-raised);border:1px solid var(--gold);color:var(--paper);padding:10px 18px;
    border-radius:4px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;
    font-family:'IBM Plex Mono',monospace;z-index:60;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  #login-screen{position:fixed;inset:0;background:var(--noir-deep);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}

  .export-panel{
    display:none;
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    z-index:40;
    width:230px;
    background:var(--noir);border:1px solid var(--line);border-left:4px solid var(--gold);
    border-radius:4px;padding:14px 16px;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  .export-panel.open{display:block;}
  .export-title{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--gold-bright);margin-bottom:10px;
  }
  .export-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .export-field{display:flex;flex-direction:column;gap:4px;}
  .export-field label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--paper-dim);text-transform:uppercase;letter-spacing:.06em;}
  .export-field input{
    background:var(--noir-raised);border:1px solid var(--line);border-radius:3px;padding:7px 9px;
    color:var(--paper);font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;
  }
  .export-field input:focus{outline:2px solid var(--gold);outline-offset:-1px;}
  .btn-export{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;text-transform:uppercase;
    background:transparent;border:1px solid var(--gold);color:var(--gold-bright);padding:8px 14px;
    border-radius:3px;cursor:pointer;white-space:nowrap;width:100%;
  }
  .btn-export:hover{background:var(--gold);color:var(--noir-deep);}
  .btn-export.secondary{border-color:var(--line);color:var(--paper-dim);}
  .btn-export.secondary:hover{border-color:var(--paper-dim);background:var(--noir-raised);color:var(--paper);}
  .login-box{width:100%;max-width:360px;background:var(--noir);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:6px;padding:32px 26px;}
  .login-box .unit-mark{margin:0 auto 16px;width:80px;height:80px;}
  .login-box .big-title{text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:23px;text-transform:uppercase;color:var(--paper);margin:0;}
  .login-box .delegado-name{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:16px;color:var(--gold-bright);margin-top:4px;margin-bottom:22px;}
  .login-error{color:#c98785;font-size:12.5px;margin-top:10px;min-height:16px;font-family:'IBM Plex Mono',monospace;}
  .login-actions{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .login-toggle{text-align:center;font-size:12px;color:var(--paper-dim);margin-top:16px;text-decoration:underline;cursor:pointer;}
  .login-toggle:hover{color:var(--paper);}
  #app-content{display:none;}

  @media(max-width:560px){
    .row2{grid-template-columns:1fr;}
    .agenda-title .big-title{font-size:24px;}
  }
</style>
</head>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDi3gcOK030i9-5c5byg0CJX85GSETCZ4c",
  authDomain: "dp--acervo.firebaseapp.com",
  projectId: "dp--acervo",
  storageBucket: "dp--acervo.firebasestorage.app",
  messagingSenderId: "875957680723",
  appId: "1:875957680723:web:bf0b1ddde63ba2653764a6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let isSignupMode = false;
let currentUser = null;
let unsubscribeSnapshot = null;

let audiencias = [];
let currentFilterAud = 'todos';
let currentModFilterAud = 'todas';
let currentRespFilterAud = 'todos';
let searchTermAud = '';

function uid(){ return crypto.randomUUID ? crypto.randomUUID() : 'id-'+Math.random().toString(36).slice(2); }
function todayISO(){ return new Date().toISOString().split('T')[0]; }
function escapeHtml(str){ const div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ---- realtime data layer: each audiência is its own document ----
// stored at users/{uid}/data/aud_{itemId} with a "type" field so the
// existing security rules (per-uid, any doc under /data) already cover it.
function dataCol(){
  return db.collection('users').doc(currentUser.uid).collection('data');
}
function audDocRef(itemId){
  return dataCol().doc('aud_'+itemId);
}

function subscribeAudiencias(){
  unsubscribeSnapshot = dataCol().where('type','==','audiencia').onSnapshot((snap)=>{
    audiencias = snap.docs.map(d=>d.data());
    renderAudiencias();
  }, (err)=>{ showToast('Erro na sincronização em tempo real.'); });
}

async function upsertAudiencia(item){
  try{ await audDocRef(item.id).set({...item, type:'audiencia'}); }
  catch(e){ showToast('Erro ao salvar. Verifique sua conexão.'); }
}
async function deleteAudienciaDoc(itemId){
  try{ await audDocRef(itemId).delete(); }
  catch(e){ showToast('Erro ao excluir. Verifique sua conexão.'); }
}

const audStatusLabels = { agendada: 'Agendada', realizada: 'Realizada', adiada: 'Adiada', cancelada: 'Cancelada' };
const envLabels = { vitima: 'Vítima', autor: 'Autor', testemunha: 'Testemunha' };
const monthAbbrev = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
function isToday(dateStr){ return dateStr === todayISO(); }

function renderAudiencias(){
  const list = document.getElementById('list-aud');
  let filtered = audiencias.filter(a=>{
    if(currentFilterAud !== 'todos' && a.status !== currentFilterAud) return false;
    if(currentModFilterAud !== 'todas' && a.modalidade !== currentModFilterAud) return false;
    if(currentRespFilterAud !== 'todos' && a.responsavel !== currentRespFilterAud) return false;
    if(searchTermAud){
      const hay = `${a.tipo} ${a.numproc} ${a.nome} ${a.local} ${a.notas} ${a.responsavel}`.toLowerCase();
      if(!hay.includes(searchTermAud.toLowerCase())) return false;
    }
    return true;
  });
  filtered.sort((a,b)=> `${a.data}${a.hora}`.localeCompare(`${b.data}${b.hora}`));

  document.getElementById('stat-total').textContent = audiencias.length;
  document.getElementById('stat-hoje').textContent = audiencias.filter(a=>isToday(a.data) && a.status==='agendada').length;
  document.getElementById('stat-atraso').textContent = audiencias.filter(a=>a.status==='agendada' && a.data < todayISO()).length;

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty"><strong>Nenhuma audiência aqui</strong>Cadastre uma nova audiência ou ajuste os filtros.</div>`;
    return;
  }

  list.innerHTML = filtered.map(a=>{
    const dt = a.data ? new Date(a.data+'T00:00:00') : null;
    const day = dt ? String(dt.getDate()).padStart(2,'0') : '--';
    const month = dt ? monthAbbrev[dt.getMonth()] : '';
    const overdue = a.status === 'agendada' && a.data <= todayISO();
    const editedNote = a.lastEditedBy ? `Última edição: ${escapeHtml(a.lastEditedBy)}` : '';
    return `
    <div class="aud-card status-${a.status} ${overdue?'overdue':''}" data-id="${a.id}">
      <div class="aud-datetime">
        <div class="d">${day}</div>
        <div class="m">${month}</div>
        <div class="t">${a.hora || '--:--'}</div>
      </div>
      <div class="aud-info">
        <div class="aud-proc">Proc. ${escapeHtml(a.numproc||'—')}</div>
        <div class="aud-tipo">${escapeHtml(a.tipo)}<span class="mod-tag ${a.modalidade||'presencial'}">${a.modalidade==='video'?'Vídeo':'Presencial'}</span></div>
        <div class="aud-meta">
          ${a.nome ? `<b>${escapeHtml(a.nome)}</b> <span class="env-tag ${a.tipoEnvolvimento||'vitima'}">${envLabels[a.tipoEnvolvimento]||'Vítima'}</span>` : ''}
          ${a.local ? ` · ${escapeHtml(a.local)}` : ''}
          ${a.responsavel ? ` · Resp.: <b>${escapeHtml(a.responsavel)}</b>` : ''}
        </div>
        ${editedNote ? `<div class="aud-edit-info">${editedNote}</div>` : ''}
      </div>
      <span class="badge status-${a.status}">${audStatusLabels[a.status]}</span>
    </div>`;
  }).join('');

  list.querySelectorAll('.aud-card').forEach(card=>{
    card.addEventListener('click', ()=> openEditAud(card.dataset.id));
  });
}

function openNewAud(){
  document.getElementById('modal-title-aud').textContent = 'Nova audiência';
  document.getElementById('edit-id-aud').value = '';
  document.getElementById('form-aud').reset();
  document.getElementById('fa-status').value = 'agendada';
  document.getElementById('fa-modalidade').value = 'presencial';
  document.getElementById('fa-tipoenvolvimento').value = 'vitima';
  document.getElementById('fa-responsavel').value = 'OIP Andrey';
  document.getElementById('btn-delete-aud').style.display = 'none';
  document.getElementById('overlay-aud').classList.add('open');
  document.getElementById('fa-numproc').focus();
}

function openEditAud(id){
  const a = audiencias.find(x=>x.id === id);
  if(!a) return;
  document.getElementById('modal-title-aud').textContent = 'Editar audiência';
  document.getElementById('edit-id-aud').value = a.id;
  document.getElementById('fa-numproc').value = a.numproc || '';
  document.getElementById('fa-nome').value = a.nome || '';
  document.getElementById('fa-tipoenvolvimento').value = a.tipoEnvolvimento || 'vitima';
  document.getElementById('fa-data').value = a.data || '';
  document.getElementById('fa-hora').value = a.hora || '';
  document.getElementById('fa-tipo').value = a.tipo || 'Instrução';
  document.getElementById('fa-modalidade').value = a.modalidade || 'presencial';
  document.getElementById('fa-local').value = a.local || '';
  document.getElementById('fa-status').value = a.status || 'agendada';
  document.getElementById('fa-responsavel').value = a.responsavel || 'OIP Andrey';
  document.getElementById('fa-notas').value = a.notas || '';
  document.getElementById('btn-delete-aud').style.display = 'inline-block';
  document.getElementById('overlay-aud').classList.add('open');
}

function closeModalAud(){ document.getElementById('overlay-aud').classList.remove('open'); }

document.getElementById('btn-open-new-aud').addEventListener('click', openNewAud);
document.getElementById('btn-close-aud').addEventListener('click', closeModalAud);
document.getElementById('btn-cancel-aud').addEventListener('click', closeModalAud);
document.getElementById('overlay-aud').addEventListener('click', (e)=>{ if(e.target.id === 'overlay-aud') closeModalAud(); });

document.getElementById('form-aud').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const id = document.getElementById('edit-id-aud').value || uid();
  const existing = audiencias.find(a=>a.id === id);
  const item = {
    id,
    numproc: document.getElementById('fa-numproc').value.trim(),
    nome: document.getElementById('fa-nome').value.trim(),
    tipoEnvolvimento: document.getElementById('fa-tipoenvolvimento').value,
    data: document.getElementById('fa-data').value,
    hora: document.getElementById('fa-hora').value,
    tipo: document.getElementById('fa-tipo').value,
    modalidade: document.getElementById('fa-modalidade').value,
    local: document.getElementById('fa-local').value.trim(),
    status: document.getElementById('fa-status').value,
    responsavel: document.getElementById('fa-responsavel').value,
    notas: document.getElementById('fa-notas').value.trim(),
    criadoEm: existing ? existing.criadoEm : new Date().toISOString(),
    lastEditedBy: currentUser.email,
    lastEditedAt: new Date().toISOString()
  };
  await upsertAudiencia(item);
  showToast(existing ? 'Audiência atualizada.' : 'Audiência cadastrada.');
  closeModalAud();
});

document.getElementById('btn-delete-aud').addEventListener('click', async ()=>{
  const id = document.getElementById('edit-id-aud').value;
  if(!id) return;
  if(!confirm('Excluir esta audiência? Esta ação não pode ser desfeita.')) return;
  await deleteAudienciaDoc(id);
  closeModalAud();
  showToast('Audiência excluída.');
});

document.getElementById('search-aud').addEventListener('input', (e)=>{ searchTermAud = e.target.value; renderAudiencias(); });
document.getElementById('filters-aud').addEventListener('click', (e)=>{
  if(!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#filters-aud .chip').forEach(c=>c.classList.remove('active'));
  e.target.classList.add('active');
  currentFilterAud = e.target.dataset.filter;
  renderAudiencias();
});
document.getElementById('filters-aud-modalidade').addEventListener('click', (e)=>{
  if(!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#filters-aud-modalidade .chip').forEach(c=>c.classList.remove('active'));
  e.target.classList.add('active');
  currentModFilterAud = e.target.dataset.mod;
  renderAudiencias();
});
document.getElementById('filters-aud-responsavel').addEventListener('click', (e)=>{
  if(!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#filters-aud-responsavel .chip').forEach(c=>c.classList.remove('active'));
  e.target.classList.add('active');
  currentRespFilterAud = e.target.dataset.resp;
  renderAudiencias();
});

// ---- exportação / backup ----
function audienciaToRow(a){
  return {
    'Nº Procedimento': a.numproc || '',
    'Nome do envolvido': a.nome || '',
    'Tipo de envolvimento': envLabels[a.tipoEnvolvimento] || '',
    'Data': a.data || '',
    'Hora': a.hora || '',
    'Tipo de audiência': a.tipo || '',
    'Modalidade': a.modalidade === 'video' ? 'Vídeo' : 'Presencial',
    'Local / Vara': a.local || '',
    'Status': audStatusLabels[a.status] || '',
    'Responsável': a.responsavel || '',
    'Observações': a.notas || '',
    'Última edição por': a.lastEditedBy || ''
  };
}

function downloadXLSX(rows, filename){
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    {wch:16},{wch:24},{wch:16},{wch:12},{wch:8},{wch:16},{wch:12},{wch:22},{wch:12},{wch:14},{wch:34},{wch:22}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Audiências');
  XLSX.writeFile(wb, filename);
}

document.getElementById('btn-export-periodo').addEventListener('click', ()=>{
  const de = document.getElementById('export-de').value;
  const ate = document.getElementById('export-ate').value;
  if(!de || !ate){ showToast('Selecione as duas datas do período.'); return; }
  if(de > ate){ showToast('A data "De" precisa ser antes da data "Até".'); return; }
  const filtered = audiencias.filter(a => a.data >= de && a.data <= ate);
  if(filtered.length === 0){ showToast('Nenhuma audiência nesse período.'); return; }
  filtered.sort((a,b)=> `${a.data}${a.hora}`.localeCompare(`${b.data}${b.hora}`));
  downloadXLSX(filtered.map(audienciaToRow), `audiencias_${de}_a_${ate}.xlsx`);
  showToast(`Relatório gerado com ${filtered.length} audiência(s).`);
  document.getElementById('export-panel').classList.remove('open');
});

document.getElementById('btn-export-backup').addEventListener('click', ()=>{
  if(audiencias.length === 0){ showToast('Nenhum dado para exportar.'); return; }
  const sorted = [...audiencias].sort((a,b)=> `${a.data}${a.hora}`.localeCompare(`${b.data}${b.hora}`));
  downloadXLSX(sorted.map(audienciaToRow), `backup_audiencias_${todayISO()}.xlsx`);
  showToast(`Backup gerado com ${sorted.length} audiência(s).`);
  document.getElementById('export-panel').classList.remove('open');
});

// ---- autenticação ----
const loginForm = document.getElementById('login-form');
const loginError = document.getElementById('login-error');
const loginToggle = document.getElementById('login-toggle');
const loginSubmit = document.getElementById('login-submit');

function friendlyAuthError(code){
  const map = {
    'auth/invalid-email': 'E-mail inválido.',
    'auth/user-not-found': 'Usuário não encontrado. Verifique o e-mail ou crie um acesso.',
    'auth/wrong-password': 'Senha incorreta.',
    'auth/invalid-credential': 'E-mail ou senha incorretos.',
    'auth/email-already-in-use': 'Já existe uma conta com esse e-mail. Tente entrar.',
    'auth/weak-password': 'A senha precisa ter pelo menos 6 caracteres.',
    'auth/too-many-requests': 'Muitas tentativas. Aguarde um instante e tente de novo.'
  };
  return map[code] || 'Não foi possível concluir. Tente novamente.';
}

loginToggle.addEventListener('click', ()=>{
  isSignupMode = !isSignupMode;
  loginSubmit.textContent = isSignupMode ? 'Criar acesso' : 'Entrar';
  loginToggle.textContent = isSignupMode ? 'Já tem uma conta? Entrar' : 'Ainda não tem conta? Criar acesso';
  loginError.textContent = '';
});

loginForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  loginError.textContent = '';
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  loginSubmit.disabled = true;
  try{
    if(isSignupMode){
      await auth.createUserWithEmailAndPassword(email, password);
    }else{
      await auth.signInWithEmailAndPassword(email, password);
    }
  }catch(err){
    loginError.textContent = friendlyAuthError(err.code);
  }finally{
    loginSubmit.disabled = false;
  }
});

document.getElementById('btn-backup-toggle').addEventListener('click', (e)=>{
  e.stopPropagation();
  document.getElementById('export-panel').classList.toggle('open');
});
document.addEventListener('click', (e)=>{
  const panel = document.getElementById('export-panel');
  const toggle = document.getElementById('btn-backup-toggle');
  if(panel.classList.contains('open') && !panel.contains(e.target) && e.target !== toggle){
    panel.classList.remove('open');
  }
});

document.getElementById('btn-logout').addEventListener('click', ()=>{
  if(confirm('Sair da conta?')) auth.signOut();
});

auth.onAuthStateChanged(async (user)=>{
  currentUser = user;
  if(user){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    document.getElementById('user-email').textContent = user.email;
    subscribeAudiencias();
  }else{
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-content').style.display = 'none';
    if(unsubscribeSnapshot) unsubscribeSnapshot();
    audiencias = [];
  }
});
</script>
</body>
</html>
